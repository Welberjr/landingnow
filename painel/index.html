<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel · landingnow</title>
<meta name="theme-color" content="#0A0A0A">
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0A;--bg-soft:#131313;--bg-card:#1A1A1A;--line:#2A2A2A;
  --ink:#FAFAFA;--ink-soft:#B8B8B8;--muted:#8A8A8A;
  --neon:#C8FF3D;--neon-soft:rgba(200,255,61,.15);--neon-glow:rgba(200,255,61,.4);
  --hot:#FF4D6D;--verde:#25D366;--azul:#60A5FA;--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;top:-15%;right:-10%;width:680px;height:680px;z-index:0;pointer-events:none;background:radial-gradient(circle,rgba(200,255,61,.07) 0%,transparent 60%);filter:blur(90px)}
.wrap{position:relative;z-index:2;width:100%;max-width:1100px;margin:0 auto;padding:0 22px}
.logo-wordmark{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.logo-img{width:30px;height:30px;border-radius:7px;object-fit:contain;display:block}
.logo-text{font-size:19px;font-weight:700;letter-spacing:-.02em}
.logo-text span{color:var(--neon)}

/* LOGIN */
#tela-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:400px;background:var(--bg-card);border:1px solid var(--line);border-radius:20px;padding:36px 30px;text-align:center}
.login-card .logo-wordmark{justify-content:center;margin-bottom:26px}
.login-card h1{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.login-card .sub{color:var(--muted);font-size:14px;margin-bottom:26px}
.campo{display:flex;flex-direction:column;gap:7px;text-align:left;margin-bottom:16px}
.campo label{font-size:13px;font-weight:600;color:var(--ink-soft)}
.campo input{background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:13px 15px;color:var(--ink);font-family:'Inter';font-size:15px;transition:border-color .2s,box-shadow .2s}
.campo input:focus{outline:none;border-color:var(--neon);box-shadow:0 0 0 3px var(--neon-soft)}
.btn-neon{width:100%;border:none;cursor:pointer;font-family:'Inter';font-weight:700;font-size:16px;color:var(--bg);background:var(--neon);padding:15px;border-radius:100px;box-shadow:0 12px 30px -10px var(--neon-glow);transition:transform .2s,box-shadow .2s;margin-top:6px}
.btn-neon:hover{transform:translateY(-2px)}
.btn-neon:disabled{opacity:.55;cursor:wait;transform:none}
.login-erro{color:var(--hot);font-size:13px;margin-top:10px;min-height:18px}

/* PAINEL */
#tela-painel{display:none;min-height:100vh;padding-bottom:60px}
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;max-width:1100px;margin:0 auto}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn-sair{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:'Inter';font-size:13px;font-weight:600;padding:8px 16px;border-radius:100px;cursor:pointer;transition:all .2s}
.btn-sair:hover{border-color:var(--hot);color:var(--hot)}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:28px 0}
.kpi{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px}
.kpi-label{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-size:26px;font-weight:800;letter-spacing:-.03em}
.kpi-val.neon{color:var(--neon)}
.kpi-val.verde{color:var(--verde)}
.kpi-val.azul{color:var(--azul)}
.kpi-val.hot{color:var(--hot)}

/* BUSCA / FILTROS */
.barra-acao{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.busca-input{flex:1;min-width:200px;background:var(--bg-card);border:1px solid var(--line);border-radius:12px;padding:11px 16px;color:var(--ink);font-family:'Inter';font-size:15px}
.busca-input:focus{outline:none;border-color:var(--neon)}
.filtros{display:flex;gap:8px;flex-wrap:wrap}
.btn-filtro{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:'Inter';font-size:13px;font-weight:600;padding:8px 16px;border-radius:100px;cursor:pointer;transition:all .2s}
.btn-filtro.ativo{background:var(--neon);border-color:var(--neon);color:var(--bg)}

/* GRUPOS DE CLIENTE */
.grupo-cliente{margin-bottom:28px}
.grupo-titulo{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)}

/* CARD DO BRIEFING */
.card{background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;transition:border-color .2s}
.card:hover{border-color:#3a3a3a}
.card-header{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none}
.card-info{flex:1;min-width:0}
.card-nome{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sub{font-size:13px;color:var(--muted);margin-top:2px}
.card-badges{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.badge-plano{background:rgba(96,165,250,.12);color:var(--azul);border:1px solid rgba(96,165,250,.2)}
.badge-valor{background:rgba(200,255,61,.1);color:var(--neon);border:1px solid rgba(200,255,61,.2)}
.badge-novo{background:rgba(255,77,109,.1);color:var(--hot);border:1px solid rgba(255,77,109,.2)}
.badge-entregue{background:rgba(255,255,255,.06);color:var(--ink-soft);border:1px solid var(--line)}
.badge-pago{background:rgba(37,211,102,.12);color:var(--verde);border:1px solid rgba(37,211,102,.2)}
.badge-receber{background:rgba(251,191,36,.1);color:#FBbf24;border:1px solid rgba(251,191,36,.2)}
.seta{font-size:18px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.card.aberto .seta{transform:rotate(180deg)}
.card-body{display:none;padding:0 20px 20px;border-top:1px solid var(--line)}
.card.aberto .card-body{display:block}

/* SECOES DO CARD */
.sec{margin-top:16px}
.sec-titulo{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.campo-dado{background:var(--bg-soft);border-radius:10px;padding:10px 14px}
.campo-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.campo-val{font-size:14px;color:var(--ink-soft)}
.galeria{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.galeria img{width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:pointer}
.galeria-logo img{width:56px;height:56px;object-fit:contain;background:var(--bg-soft);border-radius:10px;border:1px solid var(--line)}

/* FINANCEIRO */
.bloco-financeiro{background:var(--bg-soft);border-radius:12px;padding:14px 16px;margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.bloco-financeiro .valor-label{font-size:13px;color:var(--muted);font-weight:600}
.bloco-financeiro .valor-num{font-size:22px;font-weight:800;color:var(--neon)}
.bloco-financeiro .sep{width:1px;height:36px;background:var(--line);flex-shrink:0}

/* REVISOES */
.bloco-revisoes{display:flex;align-items:center;gap:12px;background:var(--bg-soft);border-radius:12px;padding:12px 16px;margin-top:14px}
.rev-info{flex:1}
.rev-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.rev-contador{font-size:18px;font-weight:800;margin-top:2px}
.rev-contador.ok{color:var(--neon)}
.rev-contador.alerta{color:#FBbf24}
.rev-contador.esgotado{color:var(--hot)}
.rev-barra{flex:1;height:6px;background:var(--line);border-radius:100px;overflow:hidden}
.rev-fill{height:100%;border-radius:100px;transition:width .3s,background .3s}
.rev-btns{display:flex;gap:8px;flex-shrink:0}
.btn-rev{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--ink);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-rev:hover:not(:disabled){border-color:var(--neon);color:var(--neon)}
.btn-rev:disabled{opacity:.3;cursor:default}

/* OBSERVACAO INTERNA */
.obs-wrap{margin-top:14px}
.obs-textarea{width:100%;background:var(--bg-soft);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--ink);font-family:'Inter';font-size:14px;resize:vertical;min-height:80px;transition:border-color .2s}
.obs-textarea:focus{outline:none;border-color:var(--neon)}
.obs-rodape{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.obs-status{font-size:12px;color:var(--muted)}
.btn-salvar-obs{background:transparent;border:1px solid var(--line);color:var(--muted);font-family:'Inter';font-size:12px;font-weight:600;padding:6px 14px;border-radius:100px;cursor:pointer;transition:all .2s}
.btn-salvar-obs:hover{border-color:var(--neon);color:var(--neon)}

/* ACOES DO CARD */
.acoes{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn-acao{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:100px;font-family:'Inter';font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-entregar{background:var(--neon);color:var(--bg);box-shadow:0 8px 20px -8px var(--neon-glow)}
.btn-entregar:hover{transform:translateY(-1px)}
.btn-reabrir{background:transparent;border:1px solid var(--line);color:var(--muted)}
.btn-reabrir:hover{border-color:var(--ink-soft);color:var(--ink)}
.btn-pago{background:var(--verde);color:#fff}
.btn-pago:hover{opacity:.88}
.btn-receber{background:transparent;border:1px solid rgba(251,191,36,.4);color:#FBbf24}
.btn-receber:hover{background:rgba(251,191,36,.08)}
.btn-wa{background:var(--verde);color:#fff}
.btn-wa:hover{opacity:.88}

/* VAZIO / LOADING */
.estado{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}

/* RESPONSIVE */
@media(max-width:600px){
  .kpi-val{font-size:20px}
  .grid2{grid-template-columns:1fr}
  .card-badges{gap:5px}
  .badge{font-size:11px;padding:4px 9px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-card">
    <a class="logo-wordmark" href="/">
      <img class="logo-img" src="/apple-touch-icon.png" alt="landingnow">
      <span class="logo-text">landingnow<span>.</span></span>
    </a>
    <h1>Painel admin</h1>
    <p class="sub">Acesso restrito à equipe LandingNow</p>
    <div class="campo"><label>E-mail</label><input id="email" type="email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="campo"><label>Senha</label><input id="senha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-neon" id="btn-login">Entrar</button>
    <p class="login-erro" id="login-erro"></p>
  </div>
</div>

<!-- PAINEL -->
<div id="tela-painel">
  <div class="topbar">
    <div class="topbar-inner">
      <a class="logo-wordmark" href="/">
        <img class="logo-img" src="/apple-touch-icon.png" alt="landingnow">
        <span class="logo-text">landingnow<span>.</span></span>
      </a>
      <div class="topbar-right">
        <span id="txt-usuario" style="font-size:13px;color:var(--muted)"></span>
        <button class="btn-sair" id="btn-sair">Sair</button>
      </div>
    </div>
  </div>

  <div class="wrap" style="padding-top:32px">
    <!-- KPIs -->
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Total de briefings</div>
        <div class="kpi-val" id="kpi-total">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Aguardando entrega</div>
        <div class="kpi-val hot" id="kpi-aguardando">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">💰 Valor a Receber</div>
        <div class="kpi-val" id="kpi-a-receber" style="color:#FBbf24">—</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">✅ Valor Recebido</div>
        <div class="kpi-val verde" id="kpi-recebido">—</div>
      </div>
    </div>

    <!-- BUSCA / FILTROS -->
    <div class="barra-acao">
      <input class="busca-input" id="busca" type="search" placeholder="Buscar cliente ou negócio…">
      <div class="filtros">
        <button class="btn-filtro ativo" data-f="todos">Todos</button>
        <button class="btn-filtro" data-f="novo">Novos</button>
        <button class="btn-filtro" data-f="entregue">Entregues</button>
        <button class="btn-filtro" data-f="pago">Pagos</button>
        <button class="btn-filtro" data-f="a_receber">A receber</button>
      </div>
    </div>

    <div id="lista-briefings"><div class="estado">Carregando…</div></div>
  </div>
</div>

<script>
const SB_URL  = "https://hubxacojvgoepowsgbas.supabase.co";
const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1YnhhY29qdmdvZXBvd3NnYmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxOTEwNjMsImV4cCI6MjA5Mzc2NzA2M30.MdjhqdZDywBVwh-V54CoacsB-sBHsQPVwH8i6NzP2eU";

// Mapa de planos: chave = valor do campo "plano" no banco
const PLANOS_MAP = {
  start:     { nome:'Start',      valor:99.90, revisoes:1 },
  pro:       { nome:'Pro',        valor:297,   revisoes:2 },
  premium:   { nome:'Premium',    valor:497,   revisoes:3 },
  premiumia: { nome:'Premium IA', valor:997,   revisoes:3 },
};
function infoPlan(slug){
  const k = (slug||'').toLowerCase().replace(/\s+/g,'').replace('-','');
  return PLANOS_MAP[k] || { nome: slug||'—', valor:0, revisoes:1 };
}
function fmtMoeda(v){ return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtData(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('pt-BR'); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function imgOk(u){ return u && typeof u==='string' && u.startsWith(SB_URL+'/storage/v1/object/public/briefings/'); }

// Token em memória + sessionStorage fallback
let TOKEN = '';
function salvarToken(t){ TOKEN=t; try{ sessionStorage.setItem('ln_token',t); }catch(e){} }
function getToken(){ if(TOKEN) return TOKEN; try{ return sessionStorage.getItem('ln_token')||''; }catch(e){ return ''; } }
function limparToken(){ TOKEN=''; try{ sessionStorage.removeItem('ln_token'); }catch(e){} }

// Estado
let todosOsBriefings = [];
let filtroAtivo = 'todos';
let buscaAtual  = '';

// ============================================================
// AUTENTICAÇÃO
// ============================================================
async function login(email, senha){
  const r = await fetch(SB_URL+'/auth/v1/token?grant_type=password',{
    method:'POST',
    headers:{'apikey':SB_ANON,'Content-Type':'application/json'},
    body:JSON.stringify({email,password:senha})
  });
  const d = await r.json();
  if(!r.ok) throw new Error(d.error_description||d.msg||'Credenciais inválidas');
  return d.access_token;
}

document.getElementById('btn-login').addEventListener('click', async()=>{
  const email=document.getElementById('email').value.trim();
  const senha=document.getElementById('senha').value;
  const btn=document.getElementById('btn-login');
  const erro=document.getElementById('login-erro');
  erro.textContent='';
  if(!email||!senha){ erro.textContent='Preencha e-mail e senha.'; return; }
  btn.disabled=true; btn.textContent='Entrando…';
  try{
    const t=await login(email,senha);
    salvarToken(t);
    document.getElementById('txt-usuario').textContent=email.split('@')[0];
    entrarNoPainel();
  }catch(e){ erro.textContent=e.message; }
  btn.disabled=false; btn.textContent='Entrar';
});

// Enter nos campos
['email','senha'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-login').click(); }));

document.getElementById('btn-sair').addEventListener('click',()=>{
  limparToken();
  document.getElementById('tela-painel').style.display='none';
  document.getElementById('tela-login').style.display='flex';
});

// ============================================================
// ENTRAR NO PAINEL
// ============================================================
async function entrarNoPainel(){
  document.getElementById('tela-login').style.display='none';
  document.getElementById('tela-painel').style.display='block';
  await carregarBriefings();
}

// Auto-login se tiver token salvo
(async()=>{
  const t=getToken();
  if(!t) return;
  salvarToken(t);
  document.getElementById('tela-painel').style.display='block';
  document.getElementById('tela-login').style.display='none';
  await carregarBriefings();
})();

// ============================================================
// CARREGAR BRIEFINGS
// ============================================================
async function carregarBriefings(){
  const t=getToken();
  if(!t) return;
  try{
    const r=await fetch(SB_URL+'/rest/v1/briefings?select=*&order=created_at.desc',{
      headers:{'apikey':SB_ANON,'Authorization':'Bearer '+t,'Content-Type':'application/json'}
    });
    if(r.status===401){ limparToken(); location.reload(); return; }
    todosOsBriefings=await r.json();
    atualizarKPIs();
    renderizarLista();
  }catch(e){
    document.getElementById('lista-briefings').innerHTML='<div class="estado">Erro ao carregar. Tente recarregar a página.</div>';
  }
}

// ============================================================
// KPIs
// ============================================================
function atualizarKPIs(){
  const total=todosOsBriefings.length;
  const aguardando=todosOsBriefings.filter(b=>b.status==='novo').length;
  let aReceber=0, recebido=0;
  todosOsBriefings.forEach(b=>{
    const val=infoPlan(b.plano).valor;
    if(b.status_pagamento==='pago') recebido+=val;
    else aReceber+=val;
  });
  document.getElementById('kpi-total').textContent=total;
  document.getElementById('kpi-aguardando').textContent=aguardando;
  document.getElementById('kpi-a-receber').textContent=fmtMoeda(aReceber);
  document.getElementById('kpi-recebido').textContent=fmtMoeda(recebido);
}

// ============================================================
// FILTROS E BUSCA
// ============================================================
document.querySelectorAll('.btn-filtro').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.btn-filtro').forEach(b=>b.classList.remove('ativo'));
    btn.classList.add('ativo');
    filtroAtivo=btn.dataset.f;
    renderizarLista();
  });
});
document.getElementById('busca').addEventListener('input',e=>{ buscaAtual=e.target.value.toLowerCase(); renderizarLista(); });

function briefingPassaFiltro(b){
  if(filtroAtivo==='novo'     && b.status!=='novo')      return false;
  if(filtroAtivo==='entregue' && b.status!=='entregue')  return false;
  if(filtroAtivo==='pago'     && b.status_pagamento!=='pago')    return false;
  if(filtroAtivo==='a_receber'&& b.status_pagamento!=='a_receber') return false;
  if(buscaAtual){
    const haystack=(b.nome_negocio+' '+b.nome_responsavel+' '+b.whatsapp).toLowerCase();
    if(!haystack.includes(buscaAtual)) return false;
  }
  return true;
}

// ============================================================
// RENDERIZAR LISTA
// ============================================================
function renderizarLista(){
  const lista=document.getElementById('lista-briefings');
  const filtrados=todosOsBriefings.filter(briefingPassaFiltro);
  if(!filtrados.length){ lista.innerHTML='<div class="estado">Nenhum briefing encontrado.</div>'; return; }

  // Agrupar por nome_negocio
  const grupos={};
  filtrados.forEach(b=>{
    const k=b.nome_negocio||'Sem nome';
    if(!grupos[k]) grupos[k]=[];
    grupos[k].push(b);
  });

  lista.innerHTML='';
  Object.keys(grupos).forEach(nome=>{
    const g=document.createElement('div');
    g.className='grupo-cliente';
    g.innerHTML=`<div class="grupo-titulo">${esc(nome)} <span style="color:var(--line);font-weight:400">(${grupos[nome].length})</span></div>`;
    grupos[nome].forEach(b=>{ g.appendChild(criarCard(b)); });
    lista.appendChild(g);
  });
}

// ============================================================
// CRIAR CARD
// ============================================================
function criarCard(b){
  const pl=infoPlan(b.plano);
  const maxRev=pl.revisoes;
  const usadas=b.revisoes_usadas||0;
  const pctRev=Math.min(usadas/maxRev,1);
  const corRev=usadas>=maxRev?'var(--hot)':usadas>0?'#FBbf24':'var(--neon)';
  const classRev=usadas>=maxRev?'esgotado':usadas>0?'alerta':'ok';
  const isPago=b.status_pagamento==='pago';
  const isEntregue=b.status==='entregue';
  const isFotos=Array.isArray(b.fotos)&&b.fotos.length;
  const isPrints=Array.isArray(b.depoimentos_prints)&&b.depoimentos_prints.length;

  const card=document.createElement('div');
  card.className='card';
  card.dataset.id=b.id;

  card.innerHTML=`
  <div class="card-header">
    <div class="card-info">
      <div class="card-nome">${esc(b.nome_negocio||'—')}</div>
      <div class="card-sub">${esc(b.nome_responsavel||'')} · ${fmtData(b.created_at)}</div>
    </div>
    <div class="card-badges">
      <span class="badge badge-plano">${esc(pl.nome)}</span>
      <span class="badge badge-valor">${fmtMoeda(pl.valor)}</span>
      <span class="badge ${isEntregue?'badge-entregue':'badge-novo'}">${isEntregue?'Entregue':'Novo'}</span>
      <span class="badge ${isPago?'badge-pago':'badge-receber'}">${isPago?'Pago':'A receber'}</span>
    </div>
    <span class="seta">▾</span>
  </div>
  <div class="card-body">

    <!-- FINANCEIRO -->
    <div class="bloco-financeiro">
      <div>
        <div class="valor-label">Plano contratado</div>
        <div style="font-size:16px;font-weight:800;margin-top:2px">${esc(pl.nome)} · <span class="kpi-val" style="font-size:16px;color:var(--neon)">${fmtMoeda(pl.valor)}</span></div>
      </div>
      <div class="sep"></div>
      <div>
        <div class="valor-label">Status pagamento</div>
        <div style="margin-top:4px">
          ${isPago
            ? `<span class="badge badge-pago">✓ Pago em ${fmtData(b.pago_em)}</span>`
            : `<span class="badge badge-receber">Aguardando pagamento</span>`}
        </div>
      </div>
    </div>

    <!-- REVISÕES -->
    <div class="bloco-revisoes">
      <div class="rev-info">
        <div class="rev-label">Revisões usadas</div>
        <div class="rev-contador ${classRev}" id="rev-num-${b.id}">${usadas} / ${maxRev}</div>
      </div>
      <div style="flex:1;padding:0 12px">
        <div class="rev-barra"><div class="rev-fill" id="rev-fill-${b.id}" style="width:${Math.round(pctRev*100)}%;background:${corRev}"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${maxRev} revisão(ões) incluída(s) no plano ${esc(pl.nome)}</div>
      </div>
      <div class="rev-btns">
        <button class="btn-rev" id="rev-menos-${b.id}" ${usadas<=0?'disabled':''} title="Remover revisão">−</button>
        <button class="btn-rev" id="rev-mais-${b.id}"  ${usadas>=maxRev?'disabled':''} title="Adicionar revisão">+</button>
      </div>
    </div>

    <!-- OBSERVAÇÃO INTERNA -->
    <div class="obs-wrap">
      <div class="sec-titulo">📝 Observação interna</div>
      <textarea class="obs-textarea" id="obs-${b.id}" placeholder="Anotar pagamentos pendentes, andamento do projeto, avisos…">${esc(b.observacao_interna||'')}</textarea>
      <div class="obs-rodape">
        <span class="obs-status" id="obs-status-${b.id}"></span>
        <button class="btn-salvar-obs" id="obs-btn-${b.id}">Salvar nota</button>
      </div>
    </div>

    <!-- DADOS DO BRIEFING -->
    <div class="sec">
      <div class="sec-titulo">Dados do briefing</div>
      <div class="grid2">
        ${b.whatsapp?`<div class="campo-dado"><div class="campo-label">WhatsApp</div><div class="campo-val">${esc(b.whatsapp)}</div></div>`:''}
        ${b.cidade_regiao?`<div class="campo-dado"><div class="campo-label">Cidade</div><div class="campo-val">${esc(b.cidade_regiao)}</div></div>`:''}
        ${b.o_que_vende?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">O que vende</div><div class="campo-val">${esc(b.o_que_vende)}</div></div>`:''}
        ${b.cliente_ideal?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">Cliente ideal</div><div class="campo-val">${esc(b.cliente_ideal)}</div></div>`:''}
        ${b.diferencial?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">Diferencial</div><div class="campo-val">${esc(b.diferencial)}</div></div>`:''}
        ${b.dominio_desejado?`<div class="campo-dado"><div class="campo-label">Domínio desejado</div><div class="campo-val">${esc(b.dominio_desejado)}</div></div>`:''}
        ${Array.isArray(b.objetivos)&&b.objetivos.length?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">Objetivos</div><div class="campo-val">${esc(b.objetivos.join(', '))}</div></div>`:''}
        ${b.referencias?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">Referências</div><div class="campo-val">${esc(b.referencias)}</div></div>`:''}
        ${b.observacoes?`<div class="campo-dado" style="grid-column:1/-1"><div class="campo-label">Observações do cliente</div><div class="campo-val">${esc(b.observacoes)}</div></div>`:''}
      </div>
    </div>

    <!-- LOGO -->
    ${b.logo_url&&imgOk(b.logo_url)?`<div class="sec"><div class="sec-titulo">Logo</div><div class="galeria galeria-logo"><img src="${b.logo_url}" alt="logo"></div></div>`:''}

    <!-- FOTOS -->
    ${isFotos?`<div class="sec"><div class="sec-titulo">Fotos do negócio (${b.fotos.length})</div><div class="galeria">${b.fotos.filter(imgOk).map(u=>`<img src="${u}" alt="foto" loading="lazy">`).join('')}</div></div>`:''}

    <!-- PRINTS / DEPOIMENTOS -->
    ${isPrints?`<div class="sec"><div class="sec-titulo">Depoimentos / Prints (${b.depoimentos_prints.length})</div><div class="galeria">${b.depoimentos_prints.filter(imgOk).map(u=>`<img src="${u}" alt="print" loading="lazy">`).join('')}</div></div>`:''}
    ${b.depoimentos_texto?`<div class="sec"><div class="sec-titulo">Depoimentos em texto</div><div class="campo-dado"><div class="campo-val">${esc(b.depoimentos_texto)}</div></div></div>`:''}

    <!-- AÇÕES -->
    <div class="acoes">
      ${!isEntregue
        ? `<button class="btn-acao btn-entregar" data-acao="entregar" data-id="${b.id}">✓ Marcar como Entregue</button>`
        : `<button class="btn-acao btn-reabrir"  data-acao="reabrir"  data-id="${b.id}">↺ Reabrir</button>`}
      ${!isPago
        ? `<button class="btn-acao btn-pago"    data-acao="pagar"   data-id="${b.id}">💰 Marcar como Pago</button>`
        : `<button class="btn-acao btn-receber" data-acao="despagar" data-id="${b.id}">↺ Desfazer Pagamento</button>`}
      ${b.whatsapp?`<a class="btn-acao btn-wa" href="https://wa.me/55${b.whatsapp.replace(/\D/g,'')}" target="_blank">WhatsApp</a>`:''}
    </div>
  </div>`;

  // Toggle abrir/fechar
  card.querySelector('.card-header').addEventListener('click',()=>card.classList.toggle('aberto'));

  // Revisões
  card.querySelector(`#rev-menos-${b.id}`).addEventListener('click',e=>{ e.stopPropagation(); alterarRevisoes(b,-1,card); });
  card.querySelector(`#rev-mais-${b.id}`).addEventListener('click',e=>{ e.stopPropagation(); alterarRevisoes(b,1,card); });

  // Observação
  card.querySelector(`#obs-btn-${b.id}`).addEventListener('click',e=>{ e.stopPropagation(); salvarObs(b,card); });

  // Ações
  card.querySelectorAll('[data-acao]').forEach(btn=>{
    btn.addEventListener('click',e=>{ e.stopPropagation(); executarAcao(btn.dataset.acao, b, card); });
  });

  return card;
}

// ============================================================
// AÇÕES
// ============================================================
async function patchBriefing(id, dados){
  const t=getToken();
  const r=await fetch(SB_URL+'/rest/v1/briefings?id=eq.'+id,{
    method:'PATCH',
    headers:{'apikey':SB_ANON,'Authorization':'Bearer '+t,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(dados)
  });
  if(!r.ok) throw new Error('Falha ao salvar (HTTP '+r.status+')');
}

async function executarAcao(acao, b, card){
  const id=b.id;
  let dados={};
  if(acao==='entregar') dados={status:'entregue'};
  else if(acao==='reabrir') dados={status:'novo'};
  else if(acao==='pagar')   dados={status_pagamento:'pago',pago_em:new Date().toISOString()};
  else if(acao==='despagar') dados={status_pagamento:'a_receber',pago_em:null};
  try{
    await patchBriefing(id,dados);
    Object.assign(b,dados);
    // Atualizar no array global
    const idx=todosOsBriefings.findIndex(x=>x.id===id);
    if(idx>=0) Object.assign(todosOsBriefings[idx],dados);
    atualizarKPIs();
    renderizarLista();
  }catch(e){ alert('Erro: '+e.message); }
}

async function alterarRevisoes(b, delta, card){
  const id=b.id;
  const pl=infoPlan(b.plano);
  const novas=Math.max(0,Math.min((b.revisoes_usadas||0)+delta,pl.revisoes));
  try{
    await patchBriefing(id,{revisoes_usadas:novas});
    b.revisoes_usadas=novas;
    const idx=todosOsBriefings.findIndex(x=>x.id===id);
    if(idx>=0) todosOsBriefings[idx].revisoes_usadas=novas;
    // Atualizar visual sem re-renderizar tudo
    const usadas=novas, maxRev=pl.revisoes;
    const pctRev=Math.min(usadas/maxRev,1);
    const corRev=usadas>=maxRev?'var(--hot)':usadas>0?'#FBbf24':'var(--neon)';
    const classRev=usadas>=maxRev?'esgotado':usadas>0?'alerta':'ok';
    const numEl=document.getElementById('rev-num-'+id);
    const fillEl=document.getElementById('rev-fill-'+id);
    if(numEl){ numEl.textContent=usadas+' / '+maxRev; numEl.className='rev-contador '+classRev; }
    if(fillEl){ fillEl.style.width=Math.round(pctRev*100)+'%'; fillEl.style.background=corRev; }
    card.querySelector('#rev-menos-'+id).disabled=(usadas<=0);
    card.querySelector('#rev-mais-'+id).disabled=(usadas>=maxRev);
  }catch(e){ alert('Erro ao salvar revisão: '+e.message); }
}

async function salvarObs(b, card){
  const id=b.id;
  const txt=document.getElementById('obs-'+id).value;
  const statusEl=document.getElementById('obs-status-'+id);
  try{
    await patchBriefing(id,{observacao_interna:txt});
    b.observacao_interna=txt;
    const idx=todosOsBriefings.findIndex(x=>x.id===id);
    if(idx>=0) todosOsBriefings[idx].observacao_interna=txt;
    statusEl.textContent='✓ Salvo';
    setTimeout(()=>statusEl.textContent='',2000);
  }catch(e){ statusEl.textContent='Erro ao salvar'; }
}
</script>
